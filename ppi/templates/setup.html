<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setup Race Goal</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --text: #13233a;
      --muted: #5d6b82;
      --card: #ffffff;
      --line: #e3e8f1;
      --accent: #0b7fab;
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: 0 12px 28px rgba(15, 30, 52, 0.08);
    }

    h1 { margin: 0 0 8px; font-size: 1.3rem; }
    p { margin: 0 0 14px; color: var(--muted); }

    .field { display: grid; gap: 6px; margin-bottom: 12px; }
    label { font-size: 0.92rem; color: var(--muted); }

    input, select, button {
      font: inherit;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #ccd7e6;
      width: 100%;
    }

    button {
      border-color: #0a739d;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    @media (max-width: 560px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Race Setup</h1>
    <p>Select athlete and configure race goal.</p>

    <form method="post" action="/setup?athlete_id={{ athlete_id }}">
      <div class="field">
        <label for="athlete_id">Athlete</label>
        <select id="athlete_id" onchange="window.location='/setup?athlete_id=' + this.value">
          {% for athlete in athletes %}
            <option value="{{ athlete.athlete_id }}" {% if athlete.athlete_id == athlete_id %}selected{% endif %}>{{ athlete.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="field">
        <label for="race_name">Race Name</label>
        <input id="race_name" name="race_name" required />
      </div>

      <div class="row">
        <div class="field">
          <label for="race_date">Race Date</label>
          <input id="race_date" name="race_date" type="date" required />
        </div>
        <div class="field">
          <label for="distance">Distance (km)</label>
          <input id="distance" name="distance" type="number" step="0.1" min="1" required />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="goal_time">Goal Time (HH:MM:SS)</label>
          <input id="goal_time" name="goal_time" placeholder="03:45:00" required />
        </div>
        <div class="field">
          <label for="elevation">Elevation Profile</label>
          <select id="elevation" name="elevation">
            <option value="flat">Flat</option>
            <option value="moderate">Moderate</option>
            <option value="hilly">Hilly</option>
            <option value="mountain">Mountain</option>
          </select>
        </div>
      </div>

      <button type="submit">Save Goal</button>
    </form>
  </main>
</body>
</html>
