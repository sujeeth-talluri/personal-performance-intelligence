<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>StrideIQ Login</title>
  <link rel='stylesheet' href='/static/app.css'>
</head>
<body>
  <main class='wrap' style='max-width:560px;'>
    <section class='card'>
      <h1>Welcome back to StrideIQ</h1>
      <p class='sub'>Login to view your running progress and race readiness.</p>
      {% if error %}<p style='color:var(--danger);'>{{ error }}</p>{% endif %}
      <form method='post'>
        <div class='row'>
          <label>Email</label>
          <input name='email' type='email' required>
        </div>
        <div class='row'>
          <label>Password</label>
          <input name='password' type='password' required>
        </div>
        <button type='submit'>Login</button>
      </form>
      <p class='sub' style='margin-top:10px;'>No account? <a class='btn' href='/register'>Create one</a></p>
    </section>
  </main>
</body>
</html>
