<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>StrideIQ Login</title>
  <link rel='stylesheet' href='/static/app.css'>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-small {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
    }
    .btn-loading { display: none; align-items: center; gap: 6px; justify-content: center; }
  </style>
</head>
<body>
  <main class='wrap' style='max-width:560px;'>
    <section class='card'>
      <h1>Welcome back to StrideIQ</h1>
      <p class='sub'>Login to view your training and race projection.</p>
      {% if error %}<p style='color:var(--danger);'>{{ error }}</p>{% endif %}
      <form method='post'>
        <div class='row'>
          <label>Email</label>
          <input name='email' type='email' required>
        </div>
        <div class='row'>
          <label>Password</label>
          <input name='password' type='password' required>
        </div>
        <button type='submit' onclick='showAuthLoading(this)'>
          <span class='btn-content'>Login</span>
          <span class='btn-loading'><span class='spinner-small'></span>Signing in...</span>
        </button>
      </form>
      <p class='sub' style='margin-top:10px;'><a href='/forgot-password'>Forgot password?</a></p>
      <p class='sub'>No account? <a href='/register'>Create one</a></p>
    </section>
  </main>
  <script>
    function showAuthLoading(btn) {
      btn.querySelector('.btn-content').style.display = 'none';
      const loading = btn.querySelector('.btn-loading');
      loading.style.display = 'flex';
      btn.disabled = true;
    }
  </script>
</body>
</html>
