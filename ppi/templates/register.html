<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>StrideIQ Register</title>
  <link rel='stylesheet' href='/static/app.css'>
</head>
<body>
  <main class='wrap' style='max-width:560px;'>
    <section class='card'>
      <h1>Create your StrideIQ account</h1>
      <p class='sub'>One account. One Strava connection. Your goal stays saved.</p>
      {% if error %}<p style='color:var(--danger);'>{{ error }}</p>{% endif %}
      <form method='post'>
        <div class='row'><label>Name</label><input name='name' required></div>
        <div class='row'><label>Email</label><input name='email' type='email' required></div>
        <div class='row'><label>Password</label><input name='password' type='password' minlength='6' required></div>
        <button type='submit'>Register</button>
      </form>
      <p class='sub' style='margin-top:10px;'>Already have account? <a href='/login'>Login</a></p>
    </section>
  </main>
</body>
</html>
