<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Forgot Password | StrideIQ</title>
  <link rel='stylesheet' href='/static/app.css'>
</head>
<body>
  <main class='wrap' style='max-width:560px;'>
    <section class='card'>
      <h1>Reset your password</h1>
      <p class='sub'>Enter your account email and we will send a reset link.</p>
      {% if message %}<p class='sub'>{{ message }}</p>{% endif %}
      <form method='post'>
        <div class='row'>
          <label>Email</label>
          <input name='email' type='email' required>
        </div>
        <button type='submit'>Send reset link</button>
      </form>
      <p class='sub' style='margin-top:10px;'><a href='/login'>Back to login</a></p>
    </section>
  </main>
</body>
</html>
