<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password · StrideIQ</title>
  <link rel="stylesheet" href="/static/css/strideiq.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }
    .login-logo {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 800;
      color: var(--green);
      letter-spacing: -0.5px;
      margin-bottom: 2px;
    }
    .login-tagline {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 36px;
    }
    .login-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .login-sub {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 28px;
    }
    .form-row {
      margin-bottom: 16px;
    }
    .form-row label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }
    .submit-btn {
      width: 100%;
      padding: 12px;
      background: var(--green);
      color: #07090f;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: var(--transition);
    }
    .submit-btn:hover {
      box-shadow: var(--shadow-glow);
      transform: translateY(-1px);
    }
    .info-msg {
      background: var(--green-dim);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-sm);
      color: var(--green);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
    .login-footer a { color: var(--green); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">StrideIQ</div>
      <div class="login-tagline">AI Marathon Coach</div>
      <div class="login-title">Reset your password</div>
      <div class="login-sub">Enter your account email and we will send a reset link.</div>
      {% if message %}<div class="info-msg">{{ message }}</div>{% endif %}
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-row">
          <label>Email</label>
          <input name="email" type="email" required placeholder="you@example.com">
        </div>
        <button type="submit" class="submit-btn">Send Reset Link</button>
      </form>
      <div class="login-footer">
        <a href="/login">Back to sign in</a>
      </div>
    </div>
  </div>
</body>
</html>
