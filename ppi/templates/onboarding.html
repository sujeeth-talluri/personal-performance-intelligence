<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>StrideIQ Onboarding</title>
  <link rel='stylesheet' href='/static/app.css'>
</head>
<body>
  <main class='wrap' style='max-width:760px;'>
    <section class='card'>
      <h1>Set up your race plan</h1>
      <p class='sub'>Do this once. You can edit anytime from settings.</p>
      <p><a class='btn' href='/connect/strava'>Connect Strava</a></p>
      {% if error %}<p style='color:var(--danger);'>{{ error }}</p>{% endif %}
      <form method='post'>
        <div class='grid2'>
          <div class='row'><label>Runner name</label><input name='runner_name' value='{{ user.name if user else "" }}' required></div>
          <div class='row'><label>Race name</label><input name='race_name' value='{{ goal.race_name if goal else "" }}' required></div>
          <div class='row'><label>Race date</label><input type='date' name='race_date' value='{{ goal.race_date if goal else "" }}' required></div>
          <div class='row'>
            <label>Race distance (km)</label>
            <input name='race_distance' list='race-distance-options' inputmode='decimal' placeholder='5, 10, 21.1, 42.2 or custom' value='{{ goal.race_distance if goal else "" }}' required>
            <div class='sub'>Quick picks: 5K, 10K, Half Marathon, Full Marathon</div>
          </div>
          <div class='row'><label>Goal time (HH:MM:SS)</label><input name='goal_time' value='{{ goal.goal_time if goal else "" }}' required></div>
          <div class='row'>
            <label>Elevation type</label>
            <select name='elevation_type'>
              <option value='flat' {% if goal and goal.elevation_type=='flat' %}selected{% endif %}>Flat</option>
              <option value='moderate' {% if not goal or goal.elevation_type=='moderate' %}selected{% endif %}>Moderate</option>
              <option value='hilly' {% if goal and goal.elevation_type=='hilly' %}selected{% endif %}>Hilly</option>
              <option value='mountain' {% if goal and goal.elevation_type=='mountain' %}selected{% endif %}>Mountain</option>
            </select>
          </div>
          <div class='row'><label>Current PB (optional)</label><input name='current_pb' value='{{ goal.personal_best if goal else "" }}'></div>
        </div>
        <datalist id='race-distance-options'>
          <option value='5'>5K</option>
          <option value='10'>10K</option>
          <option value='21.1'>Half Marathon</option>
          <option value='42.2'>Full Marathon</option>
        </datalist>
        <button type='submit'>Save and continue</button>
      </form>
    </section>
  </main>
</body>
</html>
